name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          set +e
          output=$(supabase db push --linked --yes 2>&1)
          code=$?
          {
            echo '### Supabase db push output'
            echo '```text'
            echo "$output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$output"
          exit $code
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
