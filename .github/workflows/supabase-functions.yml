name: Supabase Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/supabase-functions.yml'
  workflow_dispatch:

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  migrate:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Reconcile SQL Editor migrations
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          for version in \
            20260712020906 \
            20260712021820 \
            20260712120000 \
            20260712130000; do
            supabase migration repair --linked --status applied "$version"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Apply all pending migrations
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          supabase db push --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Configure calendar function secrets
        run: |
          supabase secrets set --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" \
            GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            GOOGLE_REFRESH_TOKEN="$GOOGLE_REFRESH_TOKEN" \
            GOOGLE_CALENDAR_ID="$GOOGLE_CALENDAR_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
      - name: Deploy all checked-in functions
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Retire removed placeholder AI function
        run: |
          if supabase functions list --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --output json \
            | jq -e '.[] | select((.slug // .name) == "draft-ai-response")' >/dev/null; then
            supabase functions delete draft-ai-response --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" --yes
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
