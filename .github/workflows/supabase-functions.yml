name: Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/livekit-token/**'
      - 'supabase/functions/livekit-remove/**'
      - '.github/workflows/supabase-functions.yml'

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy LiveKit functions
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          supabase functions deploy livekit-token
          supabase functions deploy livekit-remove
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
